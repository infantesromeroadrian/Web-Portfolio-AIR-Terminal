name: Update PromptIntel Threats

on:
  # Run every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  # Allow manual trigger
  workflow_dispatch:
  # Run on push to main (for initial setup)
  push:
    branches:
      - main
    paths:
      - "scripts/fetch-threats.ts"
      - ".github/workflows/update-threats.yml"

jobs:
  update-threats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch threats from PromptIntel
        env:
          PROMPTINTEL_API_KEY: ${{ secrets.PROMPTINTEL_API_KEY }}
        run: npx tsx scripts/fetch-threats.ts

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/threats.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/threats.json
          git commit -m "chore: update threats data from PromptIntel [skip ci]"
          git push
