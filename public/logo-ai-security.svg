<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Shield base -->
  <path d="M256 32L64 96v160c0 106 82 192 192 224 110-32 192-118 192-224V96L256 32z" 
        fill="#0a0f1a" stroke="#ff4d4d" stroke-width="12"/>
  
  <!-- Inner shield glow -->
  <path d="M256 64L96 116v140c0 88 68 160 160 188 92-28 160-100 160-188V116L256 64z" 
        fill="#111827" stroke="#00e5cc" stroke-width="4" stroke-opacity="0.6"/>
  
  <!-- AI Brain/Circuit center -->
  <g stroke="#ff4d4d" stroke-width="6" stroke-linecap="round">
    <!-- Central node -->
    <circle cx="256" cy="240" r="24" fill="#ff4d4d"/>
    
    <!-- Neural connections -->
    <line x1="256" y1="216" x2="256" y2="160"/>
    <line x1="232" y1="240" x2="176" y2="240"/>
    <line x1="280" y1="240" x2="336" y2="240"/>
    <line x1="256" y1="264" x2="256" y2="320"/>
    
    <!-- Diagonal connections -->
    <line x1="238" y1="222" x2="200" y2="184"/>
    <line x1="274" y1="222" x2="312" y2="184"/>
    <line x1="238" y1="258" x2="200" y2="296"/>
    <line x1="274" y1="258" x2="312" y2="296"/>
  </g>
  
  <!-- Outer nodes (cyan) -->
  <g fill="#00e5cc">
    <circle cx="256" cy="152" r="12"/>
    <circle cx="168" cy="240" r="12"/>
    <circle cx="344" cy="240" r="12"/>
    <circle cx="256" cy="328" r="12"/>
    <circle cx="192" cy="176" r="10"/>
    <circle cx="320" cy="176" r="10"/>
    <circle cx="192" cy="304" r="10"/>
    <circle cx="320" cy="304" r="10"/>
  </g>
  
  <!-- Lock keyhole (security symbol) -->
  <g fill="#00e5cc">
    <rect x="244" y="360" width="24" height="40" rx="4"/>
    <circle cx="256" cy="380" r="8" fill="#0a0f1a"/>
  </g>
</svg>
